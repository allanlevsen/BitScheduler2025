<div class="app-shell">

      <div class="container-xxl py-2">
        <a class="navbar-brand brand-lockup" routerLink="/events">
          <span class="brand-kicker">Bit Scheduler</span>
          <span class="brand-title">Events Console</span>
        </a>

        <div class="navbar-nav ms-auto">
          <a class="nav-link px-3" routerLink="/events" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">

        </div>
      </div>

  <main class="container-xxl py-4 py-lg-5">
