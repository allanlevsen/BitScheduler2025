<div class="app-shell">
  <app-admin-topbar />
  <app-toast-host />

  @if (clientContext.ready()) {
    <main class="container-xxl py-4 py-lg-5">
      <router-outlet />
    </main>
  } @else {
    <main class="container-xxl py-4 py-lg-5">
      <div class="card panel-card">
        <div class="card-body p-4">
          {{ clientContext.errorMessage() ?? 'Loading client context...' }}
        </div>
      </div>
    </main>
  }
</div>
