<section class="page-heading">
  <div>
    <p class="section-label mb-2">Administration</p>
    <h1>{{ title() }}</h1>
    <p class="page-subtitle">
      Maintain the resource directory used throughout scheduling and administration workflows.
    </p>
  </div>
</section>

<div class="card panel-card">
  <div class="card-body p-4 p-lg-5">
    @if (errorMessage(); as errorMessage) {
      <div class="alert alert-danger mb-4" role="alert">
        {{ errorMessage }}
      </div>
    }

    <form class="row g-4" [formGroup]="form" (ngSubmit)="submit()">
      <div class="col-lg-4">
        <label class="form-label" for="bitResourceTypeId">Resource Type</label>
        <select class="form-select" id="bitResourceTypeId" formControlName="bitResourceTypeId">
          <option [value]="0">Choose a resource type</option>
          @for (resourceType of resourceTypes(); track resourceType.bitResourceTypeId) {
            <option [value]="resourceType.bitResourceTypeId">{{ resourceType.name }}</option>
          }
        </select>
      </div>

      <div class="col-lg-4">
        <label class="form-label" for="firstName">First Name</label>
        <input class="form-control" id="firstName" type="text" formControlName="firstName" />
      </div>

      <div class="col-lg-4">
        <label class="form-label" for="lastName">Last Name</label>
        <input class="form-control" id="lastName" type="text" formControlName="lastName" />
      </div>

      <div class="col-12">
        <label class="form-label" for="emailAddress">Email Address</label>
        <input class="form-control" id="emailAddress" type="email" formControlName="emailAddress" />
      </div>

      <div class="col-12 d-flex flex-wrap gap-3 pt-2">
        <button class="btn btn-primary px-4" type="submit" [disabled]="saving()">
          {{ saving() ? 'Saving...' : submitLabel() }}
        </button>
        <button class="btn btn-outline-secondary" type="button" (click)="cancel.emit()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
